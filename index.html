<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CineHub – Stream the Future</title>
    <meta name="description" content="CineHub is the best streaming experience for watching your favorite movies and shows on demand, anytime, anywhere." />

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "surface-bright": "#3a3939",
              "on-background": "#e5e2e1",

              "headline-md": ["Be Vietnam Pro"]

            fontSize: {
              "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],

              "headline-lg": ["32px", { lineHeight: "1.3", fontWeight: "700" }],

        background-color: #0F0F0F;
        color: #e5e2e1;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .cinema-gradient {
        background: linear-gradient(0deg, #0F0F0F 0%, rgba(15,15,15,0.5) 50%, rgba(15,15,15,0.1) 100%);
      }
      /* Hide scrollbar for horizontal sliders */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
